<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Sky over London</title>
    <link rel="stylesheet" href="magic.css">
</head>

<body>

    <video autoplay muted loop playsinline class="background">
        <source src="pictures/videoplayback.mp4" type="video/mp4">
    </video>

    <header>
        <h1>Night Sky over London</h1>

        <nav>
            <a href="index.html">Home</a>
            <a href="skymap.html">Sky Map</a>
            <a href="objects.html">Objects</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="contact-main">

        <section class="contact-box">
            <h2>Social Media</h2>
            <a href="https://www.instagram.com/" target="_blank" style="text-decoration: none; margin: 0 25px;">
                <img src="pictures/instagram.png" style="width: 30px; vertical-align: middle;">
            </a>
            <a href="https://www.x.com/" target="_blank" style="text-decoration: none; margin: 0 25px;">
                <img src="pictures/X.png" style="width: 30px; vertical-align: middle;">
            </a>
            <a href="https://www.facebook.com/" target="_blank" style="text-decoration: none; margin: 0 25px;">
                <img src="pictures/Facebook.png" style="width: 30px; vertical-align: middle;">
            </a>
            <h2>Contact Form</h2>
            <p>For any enquiry, please complete this form.</p>

            <form id="contactForm" action="#" method="post" novalidate>

                <fieldset>
                    <legend>Your Details</legend>


                    <label for="firstname">First Name:</label>
                    <input type="text" id="firstname" name="firstname" required>

                    <label for="surname">Surname:</label>
                    <input type="text" id="surname" name="surname" required>

                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <div class="button">
                        <input type="submit" value="Submit">
                        <input type="reset" value="Start Again">
                    </div>

                </fieldset>

            </form>
        </section>

    </main>
    <script>
        const form = document.getElementById("contactForm");

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            if (form.checkValidity()) {
                alert("Thank you.");
                form.reset();
            } else {
                alert("All fields are required.");
            }
        });
    </script>
    <footer>
        <p>Krzysztof Tosoni 2026</p>
    </footer>



</body>

</html>
